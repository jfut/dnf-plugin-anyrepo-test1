name: test

on:
  pull_request:
  push:
    branches:
      - "*"
    tags-ignore:
      - "v[0-9]+.[0-9]+-*"
    paths-ignore:
      - ".gitignore"
      - "LICENSE"
      - "README.md"

permissions: {}

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - image: almalinux:8
          - image: almalinux:9
          - image: almalinux:10

    container:
      image: ${{ matrix.image }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install dependencies on ${{ matrix.image }}
        run: |
          set -euo pipefail
          cat /etc/os-release
          dnf install -y \
            createrepo_c \
            git \
            python3 \
            python3-dnf \
            sudo

      - name: Install aqua on ${{ matrix.image }}
        uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.1

      - name: Run unit tests on ${{ matrix.image }}
        run: just test

      - name: Run e2e tests on ${{ matrix.image }}
        run: just test-e2e
